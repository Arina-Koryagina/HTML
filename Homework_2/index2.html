<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Card game</title>
        <style>
            *
            {
                font-family: Segoe UI;
            }
            
            .player
            {
                width: 900px;
                margin: auto;
            }
            
            .card
            {
                text-align: center;
                background-color: #DCDCDC;
                display: inline-block;
                width: 55px;
                margin: auto;
                font-size: 30px;
                font-weight: 400;
                padding: 0px 5px;
            }
            
            .red
            {
                color: #8B0000;
            }
            
            p
            {
                font-size: 18px;
            }
            
        </style>
    </head>
    <body>
        <div class="player">
            <p>Player 1:</p>
            <p><span class="card">2&clubs;</span> 
            <span class="card red">9&hearts;</span> 
            <span class="card red">6&hearts;</span> 
            <span class="card red">A&diams;</span> 
            <span class="card">Q&spades;</span> 
            <span class="card">J&clubs;</span></p>
        </div>
        <div class="player">
            <p>Player 2:</p>
            <p><span class="card red">3&hearts;</span> 
            <span class="card">A&clubs;</span> 
            <span class="card">10&clubs;</span> 
            <span class="card red">K&diams;</span> 
            <span class="card">8&spades;</span> 
            <span class="card red">3&hearts;</span></p>
        </div>
    </body>
</html>
