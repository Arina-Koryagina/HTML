<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            *
            {
                font-family: Segoe UI;
                text-transform: uppercase;
                margin: 0;
                padding: 0;
            }
            .container
            {
                width: 640px;
                height: 540px;
                margin: auto;
                border-style: solid;
                border-color: #D3D3D3;
                border-width: 1px;
            }
            .title
            {
                border-bottom: 1px solid #D3D3D3;
                text-align: center;
                padding: 30px;
            }
            iframe
            {
                border: none;
            }
            .picture
            {
                padding: 40px;
                border-bottom: 1px solid #D3D3D3;
                text-align: center;
            }
            ul
            {
                list-style-type: none;
            }
            li
            {
                padding: 19px;
                display: inline-block;
                width: 64px;
            }
            li:nth-child(n)
            {
                border-right: 1px solid #D3D3D3;
            }
            li:nth-child(6)
            {
                border: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="title"><h2>cats gallery</h2></div>
            <div class="picture">
                <iframe src="icons_practice_module_3/cat_tied_256.png" name="cat" width="256px" height="256px"></iframe>
            </div>
            <ul>
            	<li><a href="icons_practice_module_3/cat_tied_256.png" target="cat"><img src="icons_practice_module_3/cat_tied_64.png"></a></li>
            	<li><a href="icons_practice_module_3/cat_eyes_256.png" target="cat"><img src="icons_practice_module_3/cat_eyes_64.png"></a></li>
            	<li><a href="icons_practice_module_3/cat_purr_256.png" target="cat"><img src="icons_practice_module_3/cat_purr_64.png"></a></li>
            	<li><a href="icons_practice_module_3/cat_cage_256.png" target="cat"><img src="icons_practice_module_3/cat_cage_64.png"></a></li>
            	<li><a href="icons_practice_module_3/cat_clean_256.png" target="cat"><img src="icons_practice_module_3/cat_clean_64.png"></a></li>
            	<li><a href="icons_practice_module_3/cat_box_256.png" target="cat"><img src="icons_practice_module_3/cat_box_64.png"></a></li>
            </ul>
        </div>
    </body>
</html>
