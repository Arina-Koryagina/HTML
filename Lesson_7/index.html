<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            *
            {
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            }
            
            .container
            {
                width: 900px;
                margin: auto;
            }
            
            .clock
            {
                border: 3px solid #008B8B;
                border-radius: 50%;
                width: 400px;
                height: 400px;
                margin: auto;
            }
            .dot
            {
                border: 3px solid #008B8B;
                background-color: #008B8B;
                border-radius: 50%;
                width: 16px;
                height: 16px;
                translate: 0px 192px;
                margin: auto;
            }
            .hour
            {
                width: 150px;
                height: 1px;
                border: 3px solid #008B8B;
                background-color: #008B8B;
                transform: translate(197px, 187px) rotate(-90deg);
                transform-origin: left;
                animation: time 60s linear infinite;
            }
            .min
            {
                width: 185px;
                height: 1px;
                border: 3px solid #008B8B;
                background-color: #008B8B;
                transform: translate(197px, 200px) rotate(-90deg);
                transform-origin: left;
                animation: time 5s linear infinite;
            }
            @keyframes time
            {
                from{transform: translate(197px, 180px) rotate(-90deg);}
                to{transform: translate(197px, 180px) rotate(270deg);}
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="clock">
                <div class="dot"></div>
                <div class="hour"></div>
                <div class="min"></div>
            </div>
        </div>
    </body>
</html>
